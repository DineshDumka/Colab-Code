version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: colab_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: colab_backend
    ports:
      - "4000:4000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/colabcode
      - JWT_SECRET=supersecretjwtforcolabcode
      - CLIENT_URL=http://localhost:80
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: colab_frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:4000
    depends_on:
      - backend

volumes:
  mongodb_data:
